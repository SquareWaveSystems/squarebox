name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: squarebox:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container creates successfully
        run: |
          docker create --name squarebox-test \
            -v /tmp/workspace:/workspace \
            squarebox:test

      - name: All tools exist
        run: |
          docker run --rm squarebox:test bash -c '
            for cmd in bat curl delta edit eza fd fresh fzf gh gh-dash glow jq lazygit rg starship xh yazi yq zoxide; do
              which "$cmd" || { echo "MISSING: $cmd"; exit 1; }
            done
          '

      - name: Shell config loads without errors
        run: docker run --rm squarebox:test bash -lc 'echo ok'

      - name: Cleanup
        if: always()
        run: docker rm -f squarebox-test 2>/dev/null || true
