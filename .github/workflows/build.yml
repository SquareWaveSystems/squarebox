name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: devbox:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Devcontainer config is valid JSON
        run: jq empty .devcontainer/devcontainer.json

      - name: Container creates successfully
        run: |
          docker create --name devbox-test \
            -v /tmp/workspace:/workspace \
            devbox:test

      - name: All tools exist
        run: |
          docker run --rm devbox:test bash -c '
            for cmd in bat curl delta eza fd fzf gh gh-dash glow jq lazygit nano rg starship xh yazi yq zoxide; do
              which "$cmd" || { echo "MISSING: $cmd"; exit 1; }
            done
          '

      - name: Shell config loads without errors
        run: docker run --rm devbox:test bash -lc 'echo ok'

      - name: Cleanup
        if: always()
        run: docker rm -f devbox-test 2>/dev/null || true
