name: E2E Tests

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Build amd64 image (shared by downstream jobs) ──────────────────────
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: squarebox:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save squarebox:test | gzip > /tmp/squarebox-test.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: squarebox-image
          path: /tmp/squarebox-test.tar.gz
          retention-days: 1

  # ── Build arm64 image via QEMU ─────────────────────────────────────────
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  # ── Host install simulation ────────────────────────────────────────────
  host-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "1.1 install.sh completes without errors"
        run: |
          # Simulate install.sh in a controlled environment
          # We can't run the full install.sh (it clones the repo + builds),
          # but we can test the key post-build logic
          INSTALL_DIR="$HOME/squarebox"
          mkdir -p "$INSTALL_DIR"
          cp -r . "$INSTALL_DIR/"

          # Test workspace directory creation (1.3)
          mkdir -p "$INSTALL_DIR/workspace"
          test -d "$INSTALL_DIR/workspace"
          echo "PASS: 1.3 workspace directory created"

      - name: "1.4 Shell integration generation"
        run: |
          # Verify install.sh's shell-integration block by running it against a
          # fixture rc file that contains legacy cruft from pre-646a589 installs.
          # Regression guard for the "alias shadows function ⇒ parse error" bug.
          export HOME="$(mktemp -d)"
          export USER_HOME="$HOME"
          SHELL_RC="$HOME/.bashrc"
          cat > "$SHELL_RC" <<'LEGACY'
          # Existing user content
          alias ll='ls -la'
          # Junk from an older install.sh
          alias sqrbx='docker start -ai squarebox'
          alias squarebox='docker start -ai squarebox'
          alias sqrbx-rebuild='~/squarebox/install.sh'
          alias squarebox-rebuild='~/squarebox/install.sh'
          sqrbx() { if command -v winpty &>/dev/null && [[ -n "${MSYSTEM:-}" ]]; then winpty docker start -ai squarebox; else docker start -ai squarebox; fi; }
          LEGACY

          # Run the exact shell-integration block from install.sh against the fixture.
          # Extract lines from "# Shell config must go" through the syntax-check block.
          awk '/^# Shell config must go/{f=1} f{print; if (/^# end squarebox shell integration$/) exit}' install.sh > /tmp/shell_block.sh
          bash /tmp/shell_block.sh

          # Assertions
          test -f "$HOME/.squarebox-shell-init" || { echo "FAIL: init file not created"; exit 1; }
          grep -q '^sqrbx() {' "$HOME/.squarebox-shell-init" || { echo "FAIL: sqrbx function missing"; exit 1; }
          grep -q '^# >>> squarebox >>>' "$SHELL_RC" || { echo "FAIL: sentinel block missing from rc"; exit 1; }
          grep -q 'squarebox-shell-init' "$SHELL_RC" || { echo "FAIL: rc does not source init file"; exit 1; }
          grep -q "^alias sqrbx=" "$SHELL_RC" && { echo "FAIL: legacy alias not scrubbed"; exit 1; }
          grep -q "^sqrbx() {" "$SHELL_RC" && { echo "FAIL: legacy one-liner function not scrubbed"; exit 1; }
          grep -q "^alias ll=" "$SHELL_RC" || { echo "FAIL: unrelated user content removed"; exit 1; }
          bash -n "$SHELL_RC" || { echo "FAIL: rc fails bash -n after edit"; exit 1; }
          bash -O expand_aliases -i -c "source '$SHELL_RC'; type sqrbx | grep -q function" </dev/null || { echo "FAIL: sqrbx not a function after source"; exit 1; }

          # Idempotency
          bash /tmp/shell_block.sh
          [ "$(grep -c '^# >>> squarebox >>>' "$SHELL_RC")" = 1 ] || { echo "FAIL: sentinel block duplicated on re-run"; exit 1; }

          echo "PASS: shell integration managed block generated and idempotent"

      - name: "1.6 Host configs seeded"
        run: |
          INSTALL_DIR="$HOME/squarebox"
          mkdir -p "$INSTALL_DIR/.config/lazygit"

          # Simulate config seeding from install.sh
          cp "$INSTALL_DIR/starship.toml" "$INSTALL_DIR/.config/starship.toml"
          printf 'git:\n  paging:\n    colorArg: always\n    pager: delta --dark --paging=never\n' > "$INSTALL_DIR/.config/lazygit/config.yml"

          test -f "$INSTALL_DIR/.config/starship.toml" || { echo "FAIL: starship.toml"; exit 1; }
          test -f "$INSTALL_DIR/.config/lazygit/config.yml" || { echo "FAIL: lazygit config"; exit 1; }
          echo "PASS: host configs seeded"

  # ── Tool verification ──────────────────────────────────────────────────
  tools-verification:
    needs: build-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: squarebox-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/squarebox-test.tar.gz | docker load

      - name: "Section 5: Tools verification"
        run: |
          docker run --rm \
            -v "$PWD/scripts:/workspace/scripts:ro" \
            squarebox:test bash -c 'scripts/e2e-test.sh tools'

  # ── Shell environment ──────────────────────────────────────────────────
  shell-environment:
    needs: build-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: squarebox-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/squarebox-test.tar.gz | docker load

      - name: "Section 4: Shell environment"
        run: |
          docker run --rm \
            -v "$PWD/scripts:/workspace/scripts:ro" \
            squarebox:test bash -c 'scripts/e2e-test.sh shell'

  # ── Setup non-interactive ──────────────────────────────────────────────
  setup-noninteractive:
    needs: build-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: squarebox-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/squarebox-test.tar.gz | docker load

      - name: "Section 3: Non-interactive setup"
        run: |
          docker run --rm \
            -v "$PWD/scripts:/workspace/scripts:ro" \
            -v /tmp/e2e-workspace:/workspace/.squarebox \
            squarebox:test bash -c 'scripts/e2e-test.sh setup'

  # ── Setup editors & SDKs ───────────────────────────────────────────────
  setup-editors-sdks:
    needs: build-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: squarebox-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/squarebox-test.tar.gz | docker load

      - name: "Section 3: Editors, multiplexers, SDKs"
        run: |
          docker run --rm \
            -v "$PWD/scripts:/workspace/scripts:ro" \
            squarebox:test bash -c 'scripts/e2e-test.sh setup-editors'
        timeout-minutes: 20

  # ── Container lifecycle ────────────────────────────────────────────────
  container-lifecycle:
    needs: build-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: squarebox-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/squarebox-test.tar.gz | docker load

      - name: "6.1-6.2 Container stop/start"
        run: |
          # Create and run container, write test files
          docker run --name sqrbx-e2e squarebox:test \
            bash -c 'echo "workspace-ok" > /workspace/e2e-test && echo "home-ok" > ~/e2e-test'

          # Container should be stopped (exited) not removed
          docker ps -a --format '{{.Names}}' | grep -q sqrbx-e2e \
            || { echo "FAIL: container was removed"; exit 1; }
          echo "PASS: 6.1 exit suspends container"

          # Verify files persist by running new commands in the stopped container
          # (docker start re-runs the original CMD which exits immediately,
          #  so we use docker cp to read files from the stopped container)
          docker cp sqrbx-e2e:/workspace/e2e-test /tmp/e2e-workspace-test
          grep -q "workspace-ok" /tmp/e2e-workspace-test \
            || { echo "FAIL: workspace file lost"; exit 1; }
          echo "PASS: 6.3 files in /workspace persist"

          docker cp sqrbx-e2e:/home/dev/e2e-test /tmp/e2e-home-test
          grep -q "home-ok" /tmp/e2e-home-test \
            || { echo "FAIL: home file lost"; exit 1; }
          echo "PASS: 6.4 files outside /workspace persist"

          echo "PASS: 6.2 container preserved state across stop"

      - name: "6.9 Volume mounts work"
        run: |
          mkdir -p /tmp/e2e-lazygit /tmp/e2e-workspace
          echo "test-starship" > /tmp/e2e-starship.toml
          echo "test-lazygit" > /tmp/e2e-lazygit/config.yml

          docker run --rm \
            -v /tmp/e2e-workspace:/workspace \
            -v /tmp/e2e-starship.toml:/home/dev/.config/starship.toml \
            -v /tmp/e2e-lazygit:/home/dev/.config/lazygit \
            squarebox:test bash -c '
              grep -q "test-starship" ~/.config/starship.toml || { echo "FAIL: starship mount"; exit 1; }
              grep -q "test-lazygit" ~/.config/lazygit/config.yml || { echo "FAIL: lazygit mount"; exit 1; }
              echo "PASS: 6.9 volume mounts work"
            '

      - name: Cleanup
        if: always()
        run: docker rm -f sqrbx-e2e 2>/dev/null || true

  # ── sqrbx-update ───────────────────────────────────────────────────────
  sqrbx-update:
    needs: build-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: squarebox-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/squarebox-test.tar.gz | docker load

      - name: "Section 7: sqrbx-update"
        run: |
          docker run --rm \
            -v "$PWD/scripts:/workspace/scripts:ro" \
            squarebox:test bash -c 'scripts/e2e-test.sh update'

  # ── Dev Container ──────────────────────────────────────────────────────
  devcontainer:
    needs: build-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: squarebox-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/squarebox-test.tar.gz | docker load

      - name: "Section 8: Devcontainer validation"
        run: |
          # Run devcontainer tests from the repo checkout (needs the json file)
          scripts/e2e-test.sh devcontainer

      - name: "8.5 DEVCONTAINER=1 skips setup"
        run: |
          # DEVCONTAINER=1 causes bashrc to touch ~/.squarebox-setup-done and skip setup.sh
          # Use bash -lic (interactive login) so bashrc is sourced
          docker run --rm -e DEVCONTAINER=1 squarebox:test \
            bash -lic 'test -f ~/.squarebox-setup-done && echo "PASS: 8.5 setup skipped in devcontainer"'

  # ── Report ─────────────────────────────────────────────────────────────
  report:
    needs:
      - build-amd64
      - build-arm64
      - host-install
      - tools-verification
      - shell-environment
      - setup-noninteractive
      - setup-editors-sdks
      - container-lifecycle
      - sqrbx-update
      - devcontainer
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate report
        env:
          BUILD_AMD64: ${{ needs.build-amd64.result }}
          BUILD_ARM64: ${{ needs.build-arm64.result }}
          HOST_INSTALL: ${{ needs.host-install.result }}
          TOOLS_VERIFICATION: ${{ needs.tools-verification.result }}
          SHELL_ENVIRONMENT: ${{ needs.shell-environment.result }}
          SETUP_NONINTERACTIVE: ${{ needs.setup-noninteractive.result }}
          SETUP_EDITORS_SDKS: ${{ needs.setup-editors-sdks.result }}
          CONTAINER_LIFECYCLE: ${{ needs.container-lifecycle.result }}
          SQRBX_UPDATE: ${{ needs.sqrbx-update.result }}
          DEVCONTAINER: ${{ needs.devcontainer.result }}
        run: scripts/e2e-report.sh > e2e-report.md

      - name: Display report
        run: cat e2e-report.md

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e-report.md
          retention-days: 90
